<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehículos - Sistema de Estacionamiento</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-bar input {
            flex: 1;
        }
        
        .table-actions {
            display: flex;
            gap: 10px;
        }
        
        .table-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 200px;
        }
        
        .filter-group label {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (igual que dashboard) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <div class="logo">P</div>
                    <div class="logo-text">
                        <h3>Sistema de</h3>
                        <p>Estacionamiento</p>
                    </div>
                </div>
            </div>
            
            <div class="user-section">
                <h4>Usuario</h4>
                <p class="user-name" id="userName"></p>
                <p class="user-role">EMPLEADO</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                
                <a href="vehiculos.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 6l3 4s2 2 2 5-2 3-2 3H5s-2 0-2-3 2-5 2-5l3-4m0 0h8m-8 0v4m8-4v4m-8 4h8"></path>
                    </svg>
                    Vehículos
                </a>
                
                <a href="clientes.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Clientes
                </a>
                
                <a href="empleados.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Empleados
                </a>
                
                <a href="entradas.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Entradas
                </a>
                
                <a href="salidas.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Salidas
                </a>
                
                <a href="reportes.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                    Reportes
                </a>
                
                <a href="#" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6m11-6h-6m-6 0H1"></path>
                    </svg>
                    Configuración
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" class="logout-btn" onclick="logout()">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Cerrar Sesión
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Gestión de Vehículos</h1>
                <div class="header-info">
                    <span class="connection-status">
                        <span class="status-dot"></span>
                        Conectado
                    </span>
                    <span class="user-info">
                       
                        <small>EMPLEADO</small>
                    </span>
                </div>
            </header>
            
            <div class="content-wrapper">
                <!-- Barra de búsqueda y botón agregar -->
                <div class="search-bar">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="form-control" 
                        placeholder="Buscar por placa, color, tipo o marca..."
                    >
                    <button class="btn btn-primary" onclick="showAddVehicleModal()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Agregar Vehículo
                    </button>
                </div>
                
                <!-- Filtros -->
                <div class="filters">
                    <div class="filter-group">
                        <label>Tipo de Vehículo</label>
                        <select id="filterTipo" class="form-control">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Color</label>
                        <select id="filterColor" class="form-control">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Marca/Modelo</label>
                        <select id="filterMarca" class="form-control">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>
                
                <!-- Tabla de vehículos -->
                <div class="card">
                    <div class="table-responsive">
                        <table id="vehiculosTable">
                            <thead>
                                <tr>
                                    <th>Placa</th>
                                    <th>Tipo</th>
                                    <th>Color</th>
                                    <th>Marca/Modelo</th>
                                    <th>Lunas Polarizadas</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="vehiculosTableBody">
                                <!-- Se llenará dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal para agregar/editar vehículo -->
    <div id="vehicleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Vehículo</h2>
                <button class="close-btn" onclick="closeVehicleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="vehicleForm">
                    <div class="form-group">
                        <label for="nroPlaca">Número de Placa *</label>
                        <input 
                            type="text" 
                            id="nroPlaca" 
                            name="nroPlaca" 
                            class="form-control" 
                            required 
                            pattern="^[A-Z0-9\-]+$"
                            maxlength="10"
                            style="text-transform: uppercase;"
                            placeholder="ABC-123"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="codTipoVhc">Tipo de Vehículo *</label>
                        <select id="codTipoVhc" name="codTipoVhc" class="form-control" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="codColor">Color *</label>
                        <select id="codColor" name="codColor" class="form-control" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="codMarcaModelo">Marca/Modelo *</label>
                        <select id="codMarcaModelo" name="codMarcaModelo" class="form-control" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="lunasPolarizadas">Lunas Polarizadas</label>
                        <select id="lunasPolarizadas" name="lunasPolarizadas" class="form-control">
                            <option value="NO">No</option>
                            <option value="SI">Sí</option>
                        </select>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeVehicleModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script src="js/vehiculos.js"></script>
</body>
</html>
